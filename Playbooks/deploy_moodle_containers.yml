---
- name: Despliegue Nativo de Moodle en Contenedores OpenShift
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "vars/moodle_stack_vars.yml"

  tasks:
    # 1. Namespace
    - name: "Asegurar que existe el Namespace"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ moodle_namespace }}"

    # 2. Secrets (Mantenemos tus claves con prefijo mysql-*)
    - name: "Crear Secret para la Base de Datos y Moodle"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ moodle_prefix }}-db-secrets"
            namespace: "{{ moodle_namespace }}"
          type: Opaque
          stringData:
            mysql-root-password: "{{ db_root_pass }}"
            mysql-password: "{{ db_pass }}"
            mysql-database: "{{ db_name }}"
            mysql-user: "{{ db_user }}"

    # 3. PersistentVolumeClaims (PVCs) en Portworx
    - name: "Crear PVC para MariaDB"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: "{{ moodle_prefix }}-db-pvc"
            namespace: "{{ moodle_namespace }}"
          spec:
            storageClassName: "{{ storage_class_db }}"
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: "{{ storage_db_size }}"

    - name: "Crear PVC para Moodledata y Moodle App"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: "{{ moodle_prefix }}-data-pvc"
            namespace: "{{ moodle_namespace }}"
          spec:
            storageClassName: "{{ storage_class }}" # Usar la SC corregida para Portworx
            accessModes:
              - ReadWriteMany
            resources:
              requests:
                storage: "{{ storage_moodle_size }}"

    # 4. Deployment: MariaDB (Red Hat Oficial)
    - name: "Desplegar Pod/Deployment de MariaDB"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ moodle_prefix }}-db"
            namespace: "{{ moodle_namespace }}"
            labels:
              app: "{{ moodle_prefix }}"
              tier: database
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: "{{ moodle_prefix }}"
                tier: database
            template:
              metadata:
                labels:
                  app: "{{ moodle_prefix }}"
                  tier: database
              spec:
                containers:
                  - name: mariadb
                    image: registry.redhat.io/rhel9/mariadb-1011:latest
                    imagePullPolicy: IfNotPresent
                    env:
                      - name: MYSQL_ROOT_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: "{{ moodle_prefix }}-db-secrets"
                            key: mysql-root-password
                      - name: MYSQL_USER
                        valueFrom:
                          secretKeyRef:
                            name: "{{ moodle_prefix }}-db-secrets"
                            key: mysql-user
                      - name: MYSQL_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: "{{ moodle_prefix }}-db-secrets"
                            key: mysql-password
                      - name: MYSQL_DATABASE
                        valueFrom:
                          secretKeyRef:
                            name: "{{ moodle_prefix }}-db-secrets"
                            key: mysql-database
                      - name: MARIADB_CHARACTER_SET
                        value: "utf8mb4"
                      - name: MARIADB_COLLATE
                        value: "utf8mb4_unicode_ci"
                    ports:
                      - containerPort: 3306
                        name: mysql
                    volumeMounts:
                      - name: db-storage
                        mountPath: /var/lib/mysql/data # Ajustado para la imagen de RHEL 9
                volumes:
                  - name: db-storage
                    persistentVolumeClaim:
                      claimName: "{{ moodle_prefix }}-db-pvc"

    # 5. Service interno: MariaDB
    - name: "Crear Service para MariaDB"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ moodle_prefix }}-db-svc"
            namespace: "{{ moodle_namespace }}"
          spec:
            selector:
              app: "{{ moodle_prefix }}"
              tier: database
            ports:
              - port: 3306
                targetPort: 3306

   # 6.1 ImageStream para almacenar la imagen compilada de Moodle
    - name: "Crear ImageStream para Moodle Web"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: image.openshift.io/v1
          kind: ImageStream
          metadata:
            name: "{{ moodle_prefix }}-web-image"
            namespace: "{{ moodle_namespace }}"

    # BuildConfig con Dockerfile inline para incluir la extensión PHP requerida por Moodle
    - name: "Crear BuildConfig con Dockerfile para incluir php-sodium"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: build.openshift.io/v1
          kind: BuildConfig
          metadata:
            name: "{{ moodle_prefix }}-web-build"
            namespace: "{{ moodle_namespace }}"
          spec:
            source:
              type: Git
              git:
                uri: "https://github.com/moodle/moodle.git"
                ref: "MOODLE_403_STABLE"
              dockerfile: |
                FROM registry.redhat.io/ubi9/php-81:latest
                USER root
                # Instalar la extensión sodium requerida por Moodle
                RUN dnf install -y php-sodium libsodium && dnf clean all
                USER 1001
                # Indicar a Composer que no re-evalúe las dependencias de red de la plataforma
                ENV COMPOSER_ARGS="--ignore-platform-reqs --no-dev"
                RUN /usr/libexec/s2i/assemble
                CMD /usr/libexec/s2i/run
            strategy:
              type: Docker
            output:
              to:
                kind: ImageStreamTag
                name: "{{ moodle_prefix }}-web-image:latest"

    # 6.3 Deployment apuntando a la imagen generada por Red Hat
    - name: "Desplegar Pod/Deployment de Moodle Web"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ moodle_prefix }}-web"
            namespace: "{{ moodle_namespace }}"
            labels:
              app: "{{ moodle_prefix }}"
              tier: frontend
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: "{{ moodle_prefix }}"
                tier: frontend
            template:
              metadata:
                labels:
                  app: "{{ moodle_prefix }}"
                  tier: frontend
              spec:
                containers:
                  - name: moodle
                    image: "image-registry.openshift-image-registry.svc:5000/{{ moodle_namespace }}/{{ moodle_prefix }}-web-image:latest"
                    env:
                      - name: MOODLE_DATABASE_HOST
                        value: "{{ moodle_prefix }}-db-svc"
                      - name: MOODLE_DATABASE_PORT_NUMBER
                        value: "3306"
                      - name: MOODLE_DATABASE_USER
                        valueFrom:
                          secretKeyRef:
                            name: "{{ moodle_prefix }}-db-secrets"
                            key: mysql-user
                      - name: MOODLE_DATABASE_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: "{{ moodle_prefix }}-db-secrets"
                            key: mysql-password
                      - name: MOODLE_DATABASE_NAME
                        valueFrom:
                          secretKeyRef:
                            name: "{{ moodle_prefix }}-db-secrets"
                            key: mysql-database
                    ports:
                      - containerPort: 8080
                        name: http
                    volumeMounts:
                      - name: moodle-data-vol
                        mountPath: /opt/app-root/src/moodledata
                        subPath: moodledata-files
                volumes:
                  - name: moodle-data-vol
                    persistentVolumeClaim:
                      claimName: "{{ moodle_prefix }}-data-pvc"

    # 7. Service: Moodle Web
    - name: "Crear Service para Moodle Web"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ moodle_prefix }}-web-svc"
            namespace: "{{ moodle_namespace }}"
          spec:
            selector:
              app: "{{ moodle_prefix }}"
              tier: frontend
            ports:
              - port: 8080
                targetPort: 8080
                name: http

    # 8. Route de OpenShift
    - name: "Exponer Moodle mediante Route de OpenShift"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: "{{ moodle_prefix }}-route"
            namespace: "{{ moodle_namespace }}"
          spec:
            to:
              kind: Service
              name: "{{ moodle_prefix }}-web-svc"
            port:
              targetPort: http
            tls:
              termination: edge
              insecureEdgeTerminationPolicy: Redirect

    # 9. Obtención y Exportación de URL
    - name: "Obtener URL pública asignada"
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        name: "{{ moodle_prefix }}-route"
        namespace: "{{ moodle_namespace }}"
      register: moodle_route_info

    - name: "Exportar URL pública a AAP"
      ansible.builtin.set_stats:
        data:
          moodle_public_url: "https://{{ moodle_route_info.resources[0].spec.host }}"